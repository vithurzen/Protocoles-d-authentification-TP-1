<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bat Computer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

      <style>
    body {
      background-color: #111;
      color: white;
      padding: 30px;
    }

    .arsenal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background-color: #1e1e1e;
      color: white;
      border: 1px solid #444;
    }

    .card i {
      font-size: 40px;
      margin-bottom: 15px;
      color: #ffc107;
    }
  </style>
</head>
<body>
    <div class="container">
    <h1>Bat Computer</h1>

    <p id="message">Chargement...</p>

    <div id="arsenal" class="arsenal-grid"></div>
  </div>
</body>
<script type="module">
    const response = await fetch('/api/me', {
    method: 'GET',
    credentials: 'same-origin'
})

const messageElement = document.getElementById('message')
if (response.ok) {
    const data = await response.json()
      messageElement.textContent = `Bienvenue, Justicier ${data.username}`
} else {
    messageElement.textContent = "Erreur lors de la récupération des informations."
}

const arsenalElement = document.getElementById('arsenal')
const username = 'vithu'
const password = 'aze'
const headers = new Headers()
headers.set('Authorization', 'Basic ' + btoa(username + ":" + password))

const response2 = await fetch('/api/secrets', {
    method: 'GET',
    headers: headers,
})

if (!response2.ok) {
    messageElement.textContent = 'Erreur : accès refusé à l’arsenal.'
}

const gadgets = await response2.json()

gadgets.forEach(gadget => {
          const card = document.createElement('div')
          card.className = 'card text-center p-3'

          card.innerHTML = `
            <div class="card-body">
              <i class="fa-solid ${gadget.icon}"></i>
              <h5 class="card-title">${gadget.name}</h5>
              <p class="card-text">${gadget.desc}</p>
            </div>
          `
          arsenalElement.appendChild(card)
        })
</script>
</html>
